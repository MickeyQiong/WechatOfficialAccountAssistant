plan_task:
  description: >
    用户提供了文章标题：{title}

    请作为微信公众号内容规划师，完成以下工作：

    1. **往期参考**（⚠️ 必须先执行）：
       - 使用 article_archive_search 工具搜索与 {title} 相关的往期文章
       - 使用 style_reference 工具分析往期写作风格
       - 使用 topic_gap_analysis 工具评估选题差异化方向

    2. **标题优化**：结合往期成功标题模式，优化原标题使其更适合微信传播
       （控制在 30 字以内，有吸引力但不标题党）

    3. **受众分析**：判断这篇文章的目标读者是谁，他们关心什么

    4. **角度选择**：结合 topic_gap_analysis 的建议，确定差异化的切入角度
       （科普、观点、教程、盘点、故事等）

    5. **结构大纲**：参考往期爆款文章的结构，设计：
       - 开头钩子（前 100 字如何抓住读者，模仿往期成功开头模式）
       - 3-5 个主体段落（每段的主题和要点）
       - 结尾（总结 + 引导关注/互动）

    6. **关键词建议**：建议 3-5 个文章关键词

    ⚠️ 核心原则：充分吸收往期文章的成功经验，让规划更精准。
  expected_output: >
    一份详细的文章规划报告（融合往期风格分析），包含：
    - 往期相关文章检索结果摘要
    - 往期风格分析摘要
    - 主题空白分析建议
    - 优化后的标题（对标往期成功标题）
    - 受众与角度分析
    - 完整结构大纲（每部分标注预计字数）
    - 关键词建议
  agent: content_planner

style_reference_task:
  description: >
    作为往期文章风格分析师，请对往期文章进行全面分析，为 {title} 文章提供风格指导。

    ⚠️ **必须使用以下工具**（按顺序）：
    1. **article_archive_search**：搜索与 {title} 最相关的往期文章（用主题关键词）
    2. **style_reference**：深入分析往期文章的写作风格要素
    3. **knowledge_rag**：检索往期中可复用的高质量素材（金句、数据、案例）

    分析维度：
    1. **语气与语调**：往期文章的整体语气是什么？口语化程度？正式度？
    2. **开头模式**：往期最成功的开头使用了什么类型？问题式？场景式？数据式？
    3. **金句风格**：往期金句有什么共同特点？句式、节奏、位置？
    4. **互动方式**：往期如何引导读者互动？结尾有什么固定模板？
    5. **排版节奏**：段落长度分布、小标题频率、图片密度

    最终输出一个"风格指南卡"供文章撰写者使用。
  expected_output: >
    一份"风格指南卡"，包含：
    - 公众号整体风格定位（一句话概括）
    - 开头模板示例（基于往期成功文章）
    - 金句写作公式
    - 结尾互动模板
    - 排版参数建议（段落长度、留白、配图频率）
    - 3-5 条可复用的往期精华素材（金句/数据/案例）
  agent: style_referencer
  context:
    - plan_task

search_task:
  description: >
    基于以下信息进行网络搜索：

    - 文章标题：{title}
    - 内容大纲：由规划任务产出

    搜索方向包括：
    1. **最新资讯**：近期的相关新闻和动态
    2. **权威数据**：行业报告、统计数据、研究结论
    3. **典型案例**：与主题相关的实际案例或故事
    4. **专家观点**：行业专家的评论和见解
    5. **背景知识**：帮助读者理解的基础知识

    为每个搜索结果标注来源和可信度评估。
  expected_output: >
    一份结构化的搜索素材报告，包含按类别整理的搜索结果，
    每条包含标题、摘要、来源链接和可信度评估。
  agent: web_searcher
  context:
    - plan_task

write_task:
  description: >
    根据以下素材撰写一篇完整的微信公众号文章：

    - 文章标题（已由规划师完成）：见大纲
    - 内容大纲：见规划任务产出
    - 搜索素材：见搜索任务产出
    - 风格指南：见风格分析任务产出
    - 往期精华素材：见风格分析师检索结果

    ⚠️ **必须使用 internal_linking 工具**生成「相关阅读」板块，添加到文末。

    写作要求：
    1. **开头（约 150 字）**：严格参照风格指南卡的开头模板，用一个抓人的钩子开始
    2. **正文（约 1200-2000 字）**：
       - 按照大纲展开，每个小节 2-4 个短段落
       - 融入往期精华素材（金句、数据、案例）并注明来源
       - 善用小标题、加粗、列表等格式提升可读性
    3. **金句设计**：按照风格指南卡的金句公式，在文中设置 2-3 句可分享的金句
    4. **结尾（约 150 字）**：总结核心观点 + 引导读者互动 + [插入「相关阅读」板块]
    5. **风格**：严格遵循风格指南卡的语气和语调建议
    6. **格式**：Markdown 格式，短文段（每段不超过 4 行），多用换行

    ⚠️ 微信写作铁律：
    - 第一句话决定读者是否继续读
    - 每个段落不超过手机屏幕的 4 行
    - 要有"金句"——可被截图分享的句子
    - 文末必须有「相关阅读」板块
  expected_output: >
    一篇完整的微信公众号文章，Markdown 格式，包含：
    - 优化后的标题（H1）
    - 引导语
    - 分段正文（H2 小标题 + 短文段，融入往期素材）
    - 结尾互动引导
    - 「相关阅读」板块（基于 internal_linking 工具推荐）
    - 标注需要配图的位置（用 [插图建议: ...] 标记）
  agent: article_writer
  context:
    - plan_task
    - search_task
    - style_reference_task

generate_image_task:
  description: >
    根据文章标题：{title}（及可选的大纲或写作稿），为微信文章生成配图创意与制作规范：
    - 输出 3 套可选视觉方案（首图、内文插图、配图样式），每套包含画面构图、主色与配色、风格（摄影/插画/扁平化等）、
      尺寸与裁剪建议、文字/图标占位说明。
    - 为每张示例图提供可直接用于图像生成模型的 prompt 与否定词，以及推荐模型和关键生成参数（如分辨率、样式tag、CFG/采样参数等）。
    - 提供每张图的替代文本（alt）、用途说明、版权/授权与使用建议。
    - 如需，可给出可运行的示例命令或生成设置（JSON 或命令格式）。
  expected_output: >
    结构化的图片素材提案：包含 3 套方案（每套含 prompt、否定词、参数、尺寸、alt 文本与使用场景），
    以及一组可复制的示例 prompt/参数与版权说明。
  agent: image_generator
  context:
    - plan_task
    - write_task
