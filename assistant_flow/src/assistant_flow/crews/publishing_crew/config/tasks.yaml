illustrate_task:
  description: >
    基于文章标题 "{title}" 和正文内容，设计图片方案：

    1. **封面图设计**：
       - 描述封面图的视觉概念（主题、色彩、构图、文字排版）
       - 画面比例 2.35:1，适合微信封面展示
       - 风格建议：简洁有力、突出标题核心信息

    2. **内容插图规划**（2-4 张）：
       - 标注每张插图在文章中的位置
       - 描述每张图的内容和风格
       - 建议尺寸和用途（数据图/示意图/氛围图）

    注意：微信封面图是用户第一眼看到的，要足够吸引人。
  expected_output: >
    一份插图设计方案，包含：
    - 封面图详细描述（用于 AI 生成）
    - 每张内容插图的描述和位置标注
    - 整体视觉风格说明
  agent: illustration_designer

layout_task:
  description: >
    对以下文章内容进行微信公众号排版优化：

    文章内容：由上一步产出

    排版要求：
    1. **标题样式**：使用合适的标题层级（H1 主标题，H2/H3 小节标题）
    2. **段落优化**：短文段（每段 2-4 句），段间空行
    3. **重点标注**：对核心观点、金句使用 **加粗** 或特殊标记
    4. **引导关注**：在文首添加公众号引导语，文末添加关注引导
    5. **排版元素**：适当使用分割线、引用块、列表等元素
    6. **配色建议**：建议主题色和强调色（微信不支持直接设置颜色，
       但可以给出 CSS/样式建议以供第三方编辑器使用）
    7. **顶部引导**：添加"点击上方蓝字关注我们"等引导语
    8. **底部信息**：添加往期推荐、话题标签等

    ⚠️ 微信排版关键原则：
    - 页边距：建议 16px（两侧留白）
    - 字间距：建议 1px
    - 行间距：建议 1.75 倍
    - 段后距：建议 10px
  expected_output: >
    经过微信排版优化的完整文章（Markdown 格式），包含：
    - 顶部关注引导
    - 排版优化后的正文（含样式标注）
    - 插图位置标注
    - 底部互动引导和往期推荐
  agent: layout_designer
  context:
    - illustrate_task

review_task:
  description: >
    对排版后的文章进行全面审核校对：

    1. **文字校对**：
       - 拼写和语法错误
       - 标点符号使用规范（中文使用全角标点）
       - 错别字和不当用词

    2. **内容审核**：
       - 事实准确性（数据、人名、时间等）
       - 逻辑一致性（前后不矛盾）
       - 引用来源可靠性

    3. **表达优化**：
       - 句子是否通顺
       - 是否存在歧义表达
       - 专业术语使用是否准确

    4. **结构检查**：
       - 段落划分是否合理
       - 小标题是否准确概括内容
       - 过渡是否自然

    用审校标记格式标注修改：
    - 需要删除的内容用 ~~删除线~~
    - 需要添加的内容用 **加粗**
    - 有问题的地方用 [审校意见: ...]
  expected_output: >
    带有审校标记的修订版文章，以及一份审校报告摘要，包含：
    - 修改数量统计
    - 主要问题分类
    - 整体质量评分（1-10）
  agent: reviewer
  context:
    - layout_task

compliance_task:
  description: >
    对照《微信公众平台运营规范》，检查文章的合规性：

    重点检查项：
    1. **政治敏感**：是否涉及敏感政治话题、领导人、政策争议
    2. **色情低俗**：是否存在低俗、性暗示或不雅内容
    3. **虚假信息**：是否存在未经证实的谣言、虚假宣传
    4. **诱导分享**：是否存在"转发得福利"、"不转不是中国人"等诱导用语
    5. **广告合规**：是否存在违规广告、夸大宣传、医疗承诺
    6. **侵权风险**：是否存在侵犯他人著作权、肖像权、名誉权的内容
    7. **标题党**：标题是否夸大、虚假、误导
    8. **价值观**：是否传播负面价值观或不良导向

    对违规风险进行分级：🔴高风险 / 🟡中风险 / 🟢低风险
  expected_output: >
    一份合规审查报告，包含：
    - 逐项检查结果
    - 风险等级评估
    - 具体的修改建议
    - 综合合规结论（通过/修改后通过/不建议发布）
  agent: compliance_checker
  context:
    - review_task

publish_task:
  description: >
    将审核通过的文章整理为最终发布版本：

    1. **清理审校标记**：移除所有审校标记，保留最终内容
    2. **格式标准化**：确保 Markdown 格式规范，可直接使用
    3. **添加发布信息**：
       - 作者署名
       - 发布日期
       - 声明（原创/转载）
    4. **输出文件**：将最终文章保存为 Markdown 文件

    发布前最终检查：
    - 标题是否吸引人且合规
    - 封面图描述是否到位（因无法真正上传图片，提供详细描述）
    - 所有 [插图建议] 标记是否已替换为实际图片位置
    - 整体是否达到发布标准
  expected_output: >
    最终发布版本的文章（Markdown 格式），发布到 output/wechat_article.md，
    包含完整的文章内容、发布信息和插图位置说明。
    文件内容即为可直接复制到微信后台的最终版本。
  agent: draft_publisher
  output_file: output/wechat_article.md
  context:
    - compliance_task
